<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>Mount Climb — Offroad</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Babylon & utilities -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/cannon.js"></script>

  <meta name="description" content="Mount Climb — Offroad driving demo (mobile-first).">
  <style>
    /* A minimal fallback so page looks good even before css/style.css loads */
    html,body { height:100%; margin:0; background:#07101a; color:#fff; font-family:Inter,system-ui,Arial,sans-serif; }
    #renderCanvas { width:100vw; height:100vh; display:block; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <!-- 3D Canvas -->
  <canvas id="renderCanvas" touch-action="none" aria-label="Game view"></canvas>

  <!-- UI Layer -->
  <div id="ui-layer" aria-hidden="false" style="pointer-events:none">

    <!-- Loading screen (show until JS hides it) -->
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;background:#07101a;">
      <img id="loadingImage" src="assets/images/loading.jpg" alt="Mount Climb" style="max-width:40vw;max-height:24vh;border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,0.6)" onerror="this.style.display='none'">
      <h1 style="margin:14px 0 6px;font-size:20px;letter-spacing:2px">MOUNT CLIMB</h1>
      <div id="loadingText" style="color:#c9d6df;margin-bottom:8px">Initializing engine…</div>
      <div style="width:60vw;max-width:520px;height:10px;background:rgba(255,255,255,0.06);border-radius:8px;overflow:hidden">
        <div id="loadingBar" style="width:0%;height:100%;background:linear-gradient(90deg,#4facfe,#00f2fe)"></div>
      </div>
      <div style="margin-top:8px;font-size:13px;color:#9fb4c8">Powered by Playful</div>
    </div>

    <!-- HUD (hidden until loaded) -->
    <div id="hud" class="hidden" aria-hidden="true" style="position:fixed;top:10px;left:14px;z-index:80;pointer-events:none">
      <div id="hud-top" style="display:flex;align-items:center;gap:12px">
        <button id="btn-camera" class="small-btn" aria-label="Switch camera" style="pointer-events:auto">CAM</button>
        <div id="speed-panel" style="pointer-events:none;display:flex;flex-direction:column">
          <div id="hud-speed" style="font-weight:700;font-size:18px">0</div>
          <div style="font-size:12px;opacity:0.8">km/h</div>
        </div>
      </div>
    </div>

    <!-- Steering wheel (left) -->
    <div id="steering-wrap" style="position:fixed;left:14px;bottom:14px;z-index:80;pointer-events:auto">
      <div id="steering-wheel" aria-label="Steering wheel" role="slider" tabindex="0" style="width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;">
        <!-- optional inline svg or image; CSS file will style it -->
        <div style="width:64px;height:64px;border-radius:10px;background:rgba(255,255,255,0.9)"></div>
      </div>
    </div>

    <!-- Pedals (right) -->
    <div id="pedals-wrap" style="position:fixed;right:14px;bottom:18px;z-index:80;pointer-events:auto;display:flex;flex-direction:column;gap:12px;align-items:center">
      <button id="btn-brake" aria-label="Brake" class="pedal brake-pedal" style="pointer-events:auto;padding:12px 18px;border-radius:12px">BRAKE</button>
      <button id="btn-gas" aria-label="Gas" class="pedal accel-pedal" style="pointer-events:auto;padding:12px 18px;border-radius:12px">GAS</button>
    </div>

    <!-- Overlay: failure -->
    <div id="overlay-retry" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:auto;background:rgba(0,0,0,0.6)">
      <div style="background:linear-gradient(180deg,#222,#111);padding:22px;border-radius:12px;color:#fff;text-align:center;max-width:92%;width:420px">
        <h2 style="margin:0 0 8px">Oh no — you fell!</h2>
        <p style="margin:0 0 12px;opacity:0.9">Your vehicle fell off the route. Try again.</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button id="retryBtn" class="action-btn" style="padding:10px 14px;border-radius:8px;background:#2ea44f;color:#fff;border:none">Retry</button>
          <button id="btn-back" class="action-btn" style="padding:10px 14px;border-radius:8px;background:#888;color:#fff;border:none">Back</button>
        </div>
      </div>
    </div>

    <!-- Overlay: success -->
    <div id="overlay-success" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:auto;background:rgba(0,0,0,0.6)">
      <div style="background:linear-gradient(180deg,#222,#111);padding:22px;border-radius:12px;color:#fff;text-align:center;max-width:92%;width:420px">
        <h2 style="margin:0 0 8px">Summit reached!</h2>
        <p style="margin:0 0 12px;opacity:0.9">You conquered the peak. Ready for the next level?</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button id="playAgainBtn" class="action-btn" style="padding:10px 14px;border-radius:8px;background:#2094ff;color:#fff;border:none">Play Again</button>
          <button id="btn-next" class="action-btn" style="padding:10px 14px;border-radius:8px;background:#ffd166;color:#111;border:none">Next Level</button>
        </div>
      </div>
    </div>

    <!-- legacy elements (some earlier code references these ids) -->
    <div id="fail-screen" class="hidden"></div>
    <div id="success-screen" class="hidden"></div>

    <!-- Debug banner -->
    <div id="debugBanner" style="position:fixed;left:12px;bottom:12px;z-index:999;color:#fff;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:8px;font-size:12px">Initializing...</div>

  </div>

  <!-- App entry (module) -->
  <script type="module" src="js/main.js"></script>

  <!-- Small safety script: ensure UI is not accidentally selectable during touch -->
  <script>
    document.addEventListener('touchstart', function(){}, {passive:true});
    // Hook retry/play buttons to reload if user clicks without JS integration yet
    document.getElementById('retryBtn')?.addEventListener('click', ()=> location.reload());
    document.getElementById('playAgainBtn')?.addEventListener('click', ()=> location.reload());
  </script>
</body>
</html>
