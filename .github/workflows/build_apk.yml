name: Build Playful APK

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'GitHub Owner'
        required: true
        type: string
      repo:
        description: 'User Repository Name'
        required: true
        type: string
      folder:
        description: 'Game Folder Name'
        required: true
        type: string
      admob_banner:
        description: 'AdMob Banner ID'
        required: false
        type: string
      admob_interstitial:
        description: 'AdMob Interstitial ID'
        required: false
        type: string
      ad_interval_minutes:
        description: 'Minutes between Interstitial Ads'
        required: false
        type: string
      watermark:
        description: 'Show Playful Watermark (true/false)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
