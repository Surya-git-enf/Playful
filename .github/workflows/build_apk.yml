name: Build Playful APK

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'GitHub Owner'
        required: true
        type: string
      repo:
        description: 'User Repository Name'
        required: true
        type: string
      folder:
        description: 'Game Folder Name'
        required: true
        type: string
      admob_banner:
        description: 'AdMob Banner ID'
        required: false
        type: string
      admob_interstitial:
        description: 'AdMob Interstitial ID'
        required: false
        type: string
      ad_interval_minutes:
        description: 'Minutes between Interstitial Ads'
        required: false
        type: string
      watermark:
        description: 'Show Playful Watermark (true/false)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder Repo
        uses: actions/checkout@v4

      - name: Fetch User Game Code
        run: |
          echo "Downloading game: ${{ inputs.folder }} from ${{ inputs.owner }}/${{ inputs.repo }}"
          git clone https://github.com/${{ inputs.owner }}/${{ inputs.repo }}.git user_game
          
      - name: Apply Monetization & Watermark
        run: |
          echo "Setting up AdMob Banner: ${{ inputs.admob_banner }}"
          echo "Setting up AdMob Interstitial: ${{ inputs.admob_interstitial }}"
          echo "Ad Interval: ${{ inputs.ad_interval_minutes }} minutes"
          echo "Watermark Enabled: ${{ inputs.watermark }}"
          
      - name: Compile APK (Capacitor/Cordova)
        run: |
          echo "Compiling HTML5 to Native Android APK..."
          mkdir -p output
          # This creates a dummy APK file so the pipeline succeeds and you can test the download!
          echo "Compiled APK data for ${{ inputs.folder }}" > output/${{ inputs.folder }}.apk
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Playful_${{ inputs.folder }}_APK
          path: output/*.apk
          
